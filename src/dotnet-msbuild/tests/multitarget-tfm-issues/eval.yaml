scenarios:
  - name: "Diagnose multi-targeting build failure"
    prompt: "Build this project and diagnose why it fails on some target frameworks but not others."
    setup:
      copy_test_files: true
    assertions:
      - type: "output_contains"
        value: "Span"
      - type: "output_contains"
        value: "System.Memory"
    rubric:
      - "Identified that Span<T> is built-in on net8.0 but not available on netstandard2.0 and net472"
      - "Suggested System.Memory NuGet package as a polyfill for older TFMs"
      - "Provided conditional PackageReference XML with correct MSBuild condition syntax"
      - "Condition correctly targets only non-net8.0 TFMs"
      - "Mentioned alternative approach using #if preprocessor directives"
    timeout: 120
