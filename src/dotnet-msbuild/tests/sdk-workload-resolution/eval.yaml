scenarios:
  - name: "Diagnose SDK resolution failures"
    prompt: "Build this project and diagnose the SDK resolution failures. Suggest fixes."
    setup:
      copy_test_files: true
    assertions:
      - type: "output_contains"
        value: "global.json"
      - type: "output_matches"
        pattern: "(NETSDK1141|NETSDK1045|SDK)"
    rubric:
      - "Identified global.json pins SDK version 99.0.100 with rollForward disable"
      - "Explained that rollForward disable prevents any SDK roll-forward"
      - "Suggested fixing global.json by removing it, updating SDK version, or changing rollForward policy"
      - "Identified net99.0 as an invalid target framework"
      - "Explained the two-layer failure: global.json blocks SDK resolution, then TFM is invalid"
    timeout: 120
