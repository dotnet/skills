scenarios:
  - name: "Diagnose NuGet restore failures"
    prompt: "Build these projects and diagnose the NuGet restore failures. Suggest fixes for each error."
    setup:
      copy_test_files: true
    assertions:
      - type: "output_contains"
        value: "NU1101"
      - type: "output_contains"
        value: "NU1605"
    rubric:
      - "Identified NU1101 error for the nonexistent package (Nonexistent.Package.That.Does.Not.Exist)"
      - "Suggested removing or replacing the nonexistent package reference"
      - "Identified NU1605 package downgrade error with the transitive dependency chain"
      - "Explained that Logging 8.0.0 requires DI.Abstractions >= 8.0.0 but direct reference pins it to 6.0.0"
      - "Suggested upgrading DI.Abstractions to 8.0.0 or higher"
    timeout: 120
