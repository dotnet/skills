scenarios:
  - name: "MSBuild skills should not activate for non-.NET projects"
    prompt: "The npm install is failing in this directory. Can you help me fix the package.json issue?"
    setup:
      copy_test_files: true
    assertions:
      - type: "output_not_contains"
        value: "dotnet build"
      - type: "output_not_contains"
        value: ".csproj"
      - type: "output_not_matches"
        pattern: "(MSBuild|msbuild|binlog)"
    rubric:
      - "Did NOT suggest running dotnet build or any MSBuild-related commands"
      - "Focused on the npm/package.json issue rather than .NET build tooling"
      - "Did not reference any MSBuild skills or .csproj files in the response"
    timeout: 60
