scenarios:
  - name: "Diagnose C# compiler errors"
    prompt: "Build these projects and diagnose the build failures. Suggest fixes for each error."
    setup:
      copy_test_files: true
    assertions:
      - type: "output_contains"
        value: "CS0246"
      - type: "output_contains"
        value: "PackageReference"
    rubric:
      - "Identified CS0246 error in MissingReference project for missing types"
      - "Suggested adding PackageReference for System.Text.Json and Microsoft.Extensions.Logging.Abstractions"
      - "Identified CS0029 type conversion error in TypeMismatch project"
      - "Identified CS8600 nullable reference type issue"
      - "Provided correct code fixes that preserve existing logic"
    timeout: 120
