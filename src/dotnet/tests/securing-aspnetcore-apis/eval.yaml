scenarios:
  - name: "Fix CORS preflight 401 with JWT auth middleware ordering"
    prompt: |
      I set up JWT authentication and CORS on my ASP.NET Core 8 API but the React SPA on https://myapp.example.com keeps getting 401 errors on preflight OPTIONS requests. Here is my middleware pipeline:

      ```csharp
      var app = builder.Build();
      app.UseHttpsRedirection();
      app.UseAuthentication();
      app.UseAuthorization();
      app.UseCors("AllowSPA");
      app.UseRateLimiter();
      app.MapControllers();
      app.Run();
      ```

      And CORS is configured as:
      ```csharp
      builder.Services.AddCors(options =>
      {
          options.AddPolicy("AllowSPA", b => b
              .AllowAnyOrigin()
              .AllowAnyMethod()
              .AllowAnyHeader()
              .AllowCredentials());
      });
      ```

      The JWT auth works fine when I test directly from Postman. What's wrong?
    assertions:
      - type: "output_matches"
        pattern: "(UseCors.*before.*UseAuthentication|middleware.*order|order.*middleware|UseCors.*UseAuth)"
      - type: "output_matches"
        pattern: "(WithOrigins|specific.*origin|AllowAnyOrigin.*AllowCredentials.*conflict|cannot.*AllowAnyOrigin.*AllowCredentials)"
    rubric:
      - "Identified that UseCors must come BEFORE UseAuthentication so OPTIONS preflight requests are handled before auth rejects them"
      - "Showed the correct middleware order: UseCors → UseAuthentication → UseAuthorization → UseRateLimiter"
      - "Identified the AllowAnyOrigin + AllowCredentials conflict (CORS spec forbids this combination)"
      - "Fixed CORS to use WithOrigins(\"https://myapp.example.com\") instead of AllowAnyOrigin when using AllowCredentials"
      - "Explained why OPTIONS requests fail: browsers send preflight with no auth token, so auth middleware returns 401 before CORS handles it"
      - "Provided the corrected full middleware pipeline code"
    expect_tools: ["bash"]
    timeout: 120

  - name: "Security skill should not activate for internal service question"
    prompt: "I have an internal gRPC service running in Kubernetes behind a service mesh. How do I set up communication between my two microservices?"
    assertions:
      - type: "output_not_contains"
        value: "JwtBearer"
      - type: "output_not_matches"
        pattern: "(AddAuthentication|JWT|CORS|rate.limit)"
    rubric:
      - "Did NOT suggest JWT/CORS/rate limiting for an internal service mesh question"
      - "Provided gRPC or service mesh relevant guidance"
    timeout: 60
