scenarios:
  - name: "Enable NRT in a small library with mixed nullability"
    prompt: |
      Enable nullable reference types in this C# project and resolve all warnings.
      The project is at TaskManager/TaskManager.csproj. Make sure the public API
      surface accurately reflects nullability. Build with: dotnet build TaskManager/TaskManager.csproj
    setup:
      files:
        - path: "TaskManager/TaskManager.csproj"
          content: |
            <Project Sdk="Microsoft.NET.Sdk">
              <PropertyGroup>
                <TargetFramework>net8.0</TargetFramework>
                <ImplicitUsings>enable</ImplicitUsings>
                <WarningsAsErrors>nullable</WarningsAsErrors>
              </PropertyGroup>
            </Project>
        - path: "TaskManager/Models/TaskItem.cs"
          content: |
            namespace TaskManager.Models;

            public class TaskItem
            {
                public int Id { get; set; }
                public string Title { get; set; }
                public string Description { get; set; }
                public string AssignedTo { get; set; }
                public DateTime? DueDate { get; set; }
                public bool IsCompleted { get; set; }
                public List<string> Tags { get; set; } = new();

                public TaskItem(string title)
                {
                    Title = title;
                }
            }
        - path: "TaskManager/Models/Project.cs"
          content: |
            namespace TaskManager.Models;

            public class Project
            {
                public string Name { get; set; }
                public string Owner { get; set; }
                public List<TaskItem> Tasks { get; } = new();

                public Project(string name, string owner)
                {
                    Name = name;
                    Owner = owner;
                }

                public TaskItem FindTaskByTitle(string title)
                {
                    return Tasks.FirstOrDefault(t => t.Title == title);
                }
            }
        - path: "TaskManager/Services/ITaskRepository.cs"
          content: |
            using TaskManager.Models;

            namespace TaskManager.Services;

            public interface ITaskRepository
            {
                TaskItem GetById(int id);
                IReadOnlyList<TaskItem> GetAll();
                void Add(TaskItem task);
                void Remove(int id);
                TaskItem FindByTitle(string title);
            }
        - path: "TaskManager/Services/InMemoryTaskRepository.cs"
          content: |
            using TaskManager.Models;

            namespace TaskManager.Services;

            public class InMemoryTaskRepository : ITaskRepository
            {
                private readonly List<TaskItem> _tasks = new();
                private int _nextId = 1;

                public TaskItem GetById(int id)
                {
                    return _tasks.FirstOrDefault(t => t.Id == id);
                }

                public IReadOnlyList<TaskItem> GetAll() => _tasks.AsReadOnly();

                public void Add(TaskItem task)
                {
                    task.Id = _nextId++;
                    _tasks.Add(task);
                }

                public void Remove(int id)
                {
                    var task = GetById(id);
                    if (task != null)
                        _tasks.Remove(task);
                }

                public TaskItem FindByTitle(string title)
                {
                    return _tasks.FirstOrDefault(t =>
                        string.Equals(t.Title, title, StringComparison.OrdinalIgnoreCase));
                }
            }
        - path: "TaskManager/Services/TaskService.cs"
          content: |
            using TaskManager.Models;

            namespace TaskManager.Services;

            public class TaskService
            {
                private readonly ITaskRepository _repository;
                private string _defaultAssignee;

                public TaskService(ITaskRepository repository, string defaultAssignee)
                {
                    _repository = repository;
                    _defaultAssignee = defaultAssignee;
                }

                public TaskItem CreateTask(string title, string description, string assignedTo = null)
                {
                    var task = new TaskItem(title)
                    {
                        Description = description,
                        AssignedTo = assignedTo ?? _defaultAssignee
                    };
                    _repository.Add(task);
                    return task;
                }

                public TaskItem GetTask(int id) => _repository.GetById(id);

                public bool CompleteTask(int id)
                {
                    var task = _repository.GetById(id);
                    if (task == null) return false;
                    task.IsCompleted = true;
                    return true;
                }

                public IReadOnlyList<TaskItem> GetTasksByAssignee(string assignee)
                {
                    return _repository.GetAll()
                        .Where(t => string.Equals(t.AssignedTo, assignee, StringComparison.OrdinalIgnoreCase))
                        .ToList();
                }
            }
        - path: "TaskManager/Services/TaskFormatter.cs"
          content: |
            using TaskManager.Models;

            namespace TaskManager.Services;

            public static class TaskFormatter
            {
                public static string FormatTask(TaskItem task)
                {
                    var status = task.IsCompleted ? "Done" : "Pending";
                    var assignee = task.AssignedTo ?? "Unassigned";
                    var due = task.DueDate.HasValue
                        ? task.DueDate.Value.ToShortDateString()
                        : "No due date";
                    return $"[{status}] {task.Title} - {assignee} (Due: {due})";
                }

                public static string FormatProject(Project project)
                {
                    var lines = new List<string>
                    {
                        $"Project: {project.Name} (Owner: {project.Owner})",
                        $"Tasks: {project.Tasks.Count}"
                    };
                    foreach (var task in project.Tasks)
                    {
                        lines.Add($"  - {FormatTask(task)}");
                    }
                    return string.Join(Environment.NewLine, lines);
                }
            }
        - path: "TaskManager/Services/CsvExporter.cs"
          content: |
            using TaskManager.Models;

            namespace TaskManager.Services;

            public class CsvExporter
            {
                private string _separator;
                private string _header;

                public CsvExporter(string separator = ",")
                {
                    _separator = separator;
                }

                public string Export(IEnumerable<TaskItem> tasks)
                {
                    _header = string.Join(_separator, "Id", "Title", "AssignedTo", "Completed");
                    var lines = new List<string> { _header };
                    foreach (var task in tasks)
                    {
                        var assignee = task.AssignedTo ?? "";
                        lines.Add(string.Join(_separator,
                            task.Id, task.Title, assignee, task.IsCompleted));
                    }
                    return string.Join(Environment.NewLine, lines);
                }
            }
    assertions:
      - type: "exit_success"
      - type: "file_contains"
        path: "TaskManager/TaskManager.csproj"
        value: "<Nullable>enable</Nullable>"
      - type: "file_contains"
        path: "TaskManager/Services/ITaskRepository.cs"
        value: "TaskItem?"
      - type: "file_contains"
        path: "TaskManager/Models/Project.cs"
        value: "TaskItem?"
      - type: "file_contains"
        path: "TaskManager/Services/TaskService.cs"
        value: "string?"
    rubric:
      - "The agent enabled NRT in the project file with <Nullable>enable</Nullable>"
      - "Methods that can return null (GetById, FindByTitle, FindTaskByTitle) have nullable return types (TaskItem?, not TaskItem)"
      - "The optional assignedTo parameter in CreateTask is annotated as string?"
      - "Description and AssignedTo properties are correctly annotated for nullability"
      - "The project builds with zero CS86xx warnings after the agent's changes"
    timeout: 300
