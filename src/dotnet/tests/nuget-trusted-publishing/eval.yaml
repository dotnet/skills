scenarios:
  - name: "Set up trusted publishing for a new NuGet library"
    prompt: |
      I have a .NET class library at src/MyLib/MyLib.csproj that I want to publish
      to nuget.org using trusted publishing (OIDC) instead of an API key.
      The repo is hosted on GitHub at myorg/mylib. Help me set this up.
    assertions:
      - type: "output_contains"
        value: "NuGet/login"
      - type: "output_contains"
        value: "id-token"
      - type: "output_matches"
        pattern: "(trusted.?publishing|OIDC)"
    rubric:
      - "Guides the user to create a trusted publishing policy on nuget.org"
      - "Mentions the workflow filename must match the nuget.org policy exactly"
      - "Includes id-token: write in the workflow permissions"
      - "Recommends local pack verification before publishing"
    timeout: 120
  - name: "Migrate existing workflow from API key to trusted publishing"
    prompt: |
      My current publish workflow uses secrets.NUGET_API_KEY to push packages.
      I want to switch to NuGet trusted publishing (OIDC). What do I need to change?
    assertions:
      - type: "output_contains"
        value: "NuGet/login"
      - type: "output_contains"
        value: "id-token"
      - type: "output_matches"
        pattern: "(api.?key|API.?KEY|NUGET_API_KEY)"
    rubric:
      - "Explains how to replace the API key with NuGet/login OIDC step"
      - "Mentions adding id-token: write permission to the job"
      - "Advises keeping the old API key secret until trusted publishing is verified"
      - "Mentions creating a trusted publishing policy on nuget.org"
    timeout: 120
