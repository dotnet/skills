scenarios:
  - name: "Profile slow API response times"
    prompt: |
      My ASP.NET Core 8 API response times jumped from 50ms to 2 seconds after deploying yesterday. The app is running on Linux in a container. Can you help me profile what's happening? I need the exact diagnostic commands to run.
    assertions:
      - type: "output_matches"
        pattern: "(dotnet-counters|dotnet-trace|dotnet-dump)"
      - type: "output_matches"
        pattern: "(cpu|latency|thread|request)"
    rubric:
      - "Verified or installed .NET diagnostic tools (dotnet-counters, dotnet-trace, dotnet-dump)"
      - "Used dotnet-counters monitor with specific counter providers (System.Runtime, Microsoft.AspNetCore.Hosting)"
      - "Provided dotnet-trace collect command with --profile cpu-sampling or explicit --providers for CPU profiling"
      - "Mentioned converting trace output for analysis (speedscope, PerfView, or dotnet-trace convert)"
      - "Identified key counters to watch: cpu-usage, gc-heap-size, threadpool-queue-length, or gen-2-gc-count"
      - "Provided concrete next steps based on what profiling data might show (CPU hot paths, thread pool starvation, GC pressure)"
    expect_tools: ["bash"]
    timeout: 120
