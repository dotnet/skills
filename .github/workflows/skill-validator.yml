name: skill-validator

on:
  pull_request:
  pull_request_target:
  schedule:
    - cron: '0 8 * * *' # daily at 08:00 UTC
  workflow_dispatch:
    inputs:
      create_release:
        description: 'Create a nightly release after building'
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  RETENTION_DAYS: ${{ (github.event_name == 'schedule' || inputs.create_release) && 90 || 5 }}
  AGNOSTIC_RID: linux-x64

jobs:
  discover:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.check.outputs.has_changes }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Check for relevant changes
        id: check
        shell: pwsh
        run: |
          $base = "${{ github.event.pull_request.base.sha }}"
          $head = "${{ github.event.pull_request.head.sha }}"
          $mergeBase = git merge-base $base $head
          $changed = git diff --name-only --diff-filter=ACMR $mergeBase $head |
            Where-Object { $_ -match '^(eng/skill-validator/|\.github/workflows/skill-validator\.yml$)' } |
            Select-Object -First 1
          if ($changed) {
            echo "has_changes=true" >> $env:GITHUB_OUTPUT
          } else {
            echo "has_changes=false" >> $env:GITHUB_OUTPUT
          }

  build:
    needs: discover
    if: always() && github.event_name != 'pull_request_target' && (needs.discover.result == 'skipped' || needs.discover.outputs.has_changes == 'true')
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
          - os: ubuntu-24.04-arm
            rid: linux-arm64
          - os: windows-latest
            rid: win-x64
          - os: windows-11-arm
            rid: win-arm64
          - os: macos-latest
            rid: osx-arm64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Build
        run: dotnet build eng/skill-validator/SkillValidator.slnx

      - name: Test
        run: dotnet test --solution eng/skill-validator/SkillValidator.slnx --no-build

      - name: Pack RID-specific NuGet package
        run: dotnet pack eng/skill-validator/src/SkillValidator.csproj --use-current-runtime

      - name: Upload RID-specific NuGet package
        uses: actions/upload-artifact@v7
        with:
          name: skill-validator-${{ matrix.rid }}
          path: artifacts/package/release/Microsoft.DotNet.SkillValidator.${{ matrix.rid }}.*.nupkg
          archive: false
          retention-days: ${{ env.RETENTION_DAYS }}
          if-no-files-found: error

      - name: Create tar.gz archive
        shell: bash
        run: |
          mkdir -p artifacts/assets
          tar -czf artifacts/assets/skill-validator-${{ matrix.rid }}.tar.gz -C artifacts/publish/SkillValidator/release .

      - name: Upload tar.gz archive
        uses: actions/upload-artifact@v7
        with:
          name: skill-validator-${{ matrix.rid }}.tar.gz
          path: artifacts/assets/skill-validator-${{ matrix.rid }}.tar.gz
          archive: false
          retention-days: ${{ env.RETENTION_DAYS }}
          if-no-files-found: error

      - name: Pack RID-agnostic NuGet package
        if: matrix.rid == env.AGNOSTIC_RID
        run: dotnet pack eng/skill-validator/src/SkillValidator.csproj

      - name: Upload RID-agnostic NuGet package
        if: matrix.rid == env.AGNOSTIC_RID
        uses: actions/upload-artifact@v7
        with:
          archive: false
          name: skill-validator
          path: |
            artifacts/package/release/Microsoft.DotNet.SkillValidator.*.nupkg
            !artifacts/package/release/Microsoft.DotNet.SkillValidator.${{ env.AGNOSTIC_RID }}.*.nupkg
          retention-days: ${{ env.RETENTION_DAYS }}
          if-no-files-found: error

  release:
    if: github.event_name == 'schedule' || (github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main' && inputs.create_release)
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-assets
          merge-multiple: true

      - name: Create or update nightly release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="skill-validator-nightly"
          gh release delete "$tag" --yes || true
          git tag -f "$tag"
          git push -f origin "$tag"
          gh release create "$tag" release-assets/*.nupkg release-assets/*.tar.gz \
            --title "SkillValidator Nightly" \
            --notes "Automated nightly build from \`main\` ($(date -u +%Y-%m-%d))." \
            --prerelease

  report-status:
    needs: [discover, build]
    if: >-
      always() && github.event_name == 'pull_request' &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    permissions:
      statuses: write
    steps:
      - name: Set skill-validator commit status
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          HAS_CHANGES="${{ needs.discover.outputs.has_changes }}"
          BUILD_RESULT="${{ needs.build.result }}"

          if [[ "$HAS_CHANGES" != "true" ]]; then
            STATE="success"
            DESC="No skill-validator changes"
          elif [[ "$BUILD_RESULT" == "success" ]]; then
            STATE="success"
            DESC="Build and tests passed"
          elif [[ "$BUILD_RESULT" == "failure" ]]; then
            STATE="failure"
            DESC="Build or tests failed"
          else
            STATE="error"
            DESC="Build did not complete ($BUILD_RESULT)"
          fi

          gh api "repos/${{ github.repository }}/statuses/${{ github.event.pull_request.head.sha }}" \
            -f state="$STATE" \
            -f context="skill-validator" \
            -f description="$DESC" \
            -f target_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

  # Post skill-validator commit status for fork PRs using pull_request_target
  # (which runs with base repo permissions). Fork PRs should never change
  # skill-validator, so this always posts success.
  fork-status:
    if: >-
      github.event_name == 'pull_request_target' &&
      github.event.pull_request.head.repo.full_name != github.repository
    runs-on: ubuntu-latest
    permissions:
      statuses: write
    steps:
      - name: Post skill-validator commit status
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh api "repos/${{ github.repository }}/statuses/${{ github.event.pull_request.head.sha }}" \
            -f state="success" \
            -f context="skill-validator" \
            -f description="No skill-validator changes" \
            -f target_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
