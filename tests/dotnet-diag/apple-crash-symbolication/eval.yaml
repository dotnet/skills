scenarios:
  - name: "Parse .NET frames and locate dSYMs from an iOS crash log"
    prompt: "I have an iOS .ips crash log at ios_crash.ips from a crashed .NET MAUI app. Please parse the crash log, identify the .NET runtime frames that need symbolication, and help me locate the dSYM files I need to resolve them."
    setup:
      copy_test_files: true
    assertions:
      - type: "output_matches"
        pattern: "libcoreclr"
      - type: "output_matches"
        pattern: "(dSYM|dsym|SDK.packs|NuGet.cache|nuget)"
      - type: "output_matches"
        pattern: "(SIGABRT|EXC_CRASH)"
    rubric:
      - "Identified that the crash log contains CoreCLR .NET runtime frames and extracted the unsymbolicated frame addresses"
      - "Extracted UUIDs for the .NET libraries (e.g., libcoreclr) and explained that each library needs a UUID-matched dSYM"
      - "Provided specific dSYM search paths (SDK packs, NuGet cache, or build output) for the .NET runtime libraries"
      - "Generated correct atos commands with proper load addresses and frame offsets for the user to run on macOS"
      - "Identified all .NET binary images in the crash log (not just the crashed thread) with their UUIDs and base load addresses, and named the correct NuGet runtime package (e.g., Microsoft.NETCore.App.Runtime.ios-arm64)"
    timeout: 300

  - name: "Investigate root cause of a .NET MAUI iOS crash"
    prompt: "I have an iOS .ips crash log at ios_crash.ips from a crashed .NET MAUI app. Please analyze the crash log and help me figure out what went wrong."
    setup:
      copy_test_files: true
    assertions:
      - type: "output_matches"
        pattern: "(SIGABRT|EXC_CRASH|abort)"
      - type: "output_matches"
        pattern: "(SampleMAUI|libcoreclr)"
    rubric:
      - "Extracted the exception type and any application-specific crash messages from the crash log"
      - "Identified that the crash is a SIGABRT / EXC_CRASH in a CoreCLR .NET MAUI app"
      - "Examined both the faulting thread and lastExceptionBacktrace for .NET frames"
      - "Provided specific dSYM search paths (SDK packs or NuGet cache) for symbolicating the CoreCLR frames"
    timeout: 300

  - name: "Reject Android tombstone passed as iOS crash log"
    prompt: "I have a crash file at crash_android.txt from a crashed app. Please use the iOS crash symbolication skill to symbolicate the .NET runtime frames."
    expect_activation: false
    setup:
      copy_test_files: true
      extra_files:
        - source: "../android-tombstone-symbolication/tombstone_sample.txt"
          dest: "crash_android.txt"
    assertions:
      - type: "output_matches"
        pattern: "(Android|tombstone|not.*(iOS|.ips)|wrong.*(format|type)|different.*(format|process))"
    rubric:
      - "Recognized that this is an Android tombstone, not an iOS .ips crash log"
      - "Did NOT attempt to apply the iOS crash symbolication workflow"
      - "Did NOT attempt to run atos or search for dSYMs"
      - "Suggested using an Android-specific crash analysis approach (e.g., ndk-stack, addr2line, or a dedicated tool) instead"
    timeout: 300
