scenarios:
  # --- Scenario 1: Core libraries (BinaryFormatter, params span, BigInteger, floating point) ---
  - name: "Console app with BinaryFormatter, params span in expressions, and floating-point conversions"
    prompt: |
      I have a .NET 8 console app that:
      - Uses BinaryFormatter to serialize/deserialize a session cache to disk
      - Has LINQ expression trees that call string.Join with expanded params: `(x, y) => string.Join("", x, y)`
      - Relies on `(int)float.NaN` returning `int.MinValue` for sentinel detection
      - Uses BigInteger for large number calculations (well within normal range)
      What breaks when migrating to .NET 9?
    assertions:
      - type: "output_matches"
        pattern: "(BinaryFormatter|NotSupportedException|SYSLIB|serializ)"
      - type: "output_matches"
        pattern: "(params|[Ss]pan|ReadOnlySpan|Expression|CS8640|CS9226|explicit.*array)"
      - type: "output_matches"
        pattern: "(saturating|NaN|float.*integer|int\\.MinValue|int\\.MaxValue)"
    rubric:
      - "Identifies BinaryFormatter now always throws NotSupportedException; recommends migration to System.Text.Json, MessagePack, or protobuf-net"
      - "Identifies params span overload resolution change causing errors in Expression lambdas; recommends passing explicit array"
      - "Explains floating-point to integer conversions are now saturating — NaN returns 0, not int.MinValue"
    timeout: 240

  # --- Scenario 2: C# 13 compiler breaking changes ---
  - name: "C# 13 compiler breaking changes — InlineArray on record, iterator safe context, collection expressions"
    prompt: |
      I'm migrating a .NET 8 library to .NET 9 / C# 13 and getting compiler errors. Here's the code:

      ```csharp
      // Buffer.cs
      [System.Runtime.CompilerServices.InlineArray(10)]
      record struct Buffer()
      {
          private int _element0;
      }
      ```

      ```csharp
      // Generator.cs
      unsafe class DataGenerator
      {
          IEnumerable<int> Generate()
          {
              yield return 1;
              Process();
              void Process()
              {
                  int* p = stackalloc int[10];
                  // ... work with pointer
              }
          }
      }
      ```

      ```csharp
      // Resolver.cs
      class Resolver
      {
          static void Process(ReadOnlySpan<int> ros) {}
          static void Process(Span<object> s) {}

          static void Main()
          {
              Process([]);  // this compiled in .NET 8
          }
      }
      ```

      What breaks in each case and how do I fix it?
    assertions:
      - type: "output_matches"
        pattern: "(InlineArray|record struct|CS9259|struct)"
      - type: "output_matches"
        pattern: "(iterator|safe context|unsafe|local function)"
      - type: "output_matches"
        pattern: "(collection expression|overload|\\[\\]|ambig)"
    rubric:
      - "Identifies InlineArray on record struct is disallowed (CS9259); recommends changing to a plain struct"
      - "Identifies iterator safe context breaks unsafe code in nested local functions; recommends adding unsafe modifier to local function"
      - "Identifies collection expression overload resolution change for empty [] — no longer uses span to tiebreak"
    timeout: 180

  # --- Scenario 3: ASP.NET Core — HostBuilder validation, forwarded headers, HttpClientFactory ---
  - name: "ASP.NET Core app with DI validation, forwarded headers, and HttpClientFactory casting"
    prompt: |
      I'm upgrading a .NET 8 ASP.NET Core web API to .NET 9. The codebase:
      - Runs behind a reverse proxy and uses ForwardedHeadersMiddleware with X-Forwarded-For headers
      - Has some DI registrations where a scoped service is injected into a singleton (works in .NET 8 in development)
      - Uses HttpClientFactory and casts the primary handler to HttpClientHandler to set UseCookies=false
      - Has Trace-level logging enabled to debug HTTP request headers in production
      - Uses dotnet watch for development with Hot Reload targeting net8.0
      What needs to change for .NET 9?
    assertions:
      - type: "output_matches"
        pattern: "(ValidateOnBuild|ValidateScopes|development|DI|scope)"
      - type: "output_matches"
        pattern: "(ForwardedHeaders|KnownProxies|unknown prox)"
      - type: "output_matches"
        pattern: "(SocketsHttpHandler|HttpClientHandler|InvalidCastException|primary handler)"
    rubric:
      - "Identifies ValidateOnBuild/ValidateScopes now enabled in development — scoped-into-singleton will throw at startup"
      - "Warns about ForwardedHeadersMiddleware ignoring headers from unknown proxies; recommends adding proxy to KnownProxies"
      - "Identifies HttpClientFactory now uses SocketsHttpHandler; casting to HttpClientHandler throws InvalidCastException"
      - "Mentions header values are redacted by default in HttpClientFactory logging"
    timeout: 240

  # --- Scenario 4: EF Core — Pending migrations, explicit transactions, Cosmos discriminator ---
  - name: "EF Core app with migration patterns and Cosmos DB discriminator"
    prompt: |
      I'm migrating a .NET 8 app using EF Core 9. The codebase:
      - Applies migrations resiliently using ExecutionStrategy + BeginTransaction + MigrateAsync pattern
      - Has HasData() seed data that includes `DateTime.UtcNow` for CreatedAt timestamps
      - Uses the Cosmos DB provider and has existing documents with "Discriminator" property
      - Has synchronous Cosmos DB queries like `.ToList()` and `SaveChanges()`
      - References Microsoft.EntityFrameworkCore.Design with PrivateAssets=all
      What breaks in EF Core 9 and how do I fix each?
    assertions:
      - type: "output_matches"
        pattern: "(explicit transaction|MigrateAsync|BeginTransaction)"
      - type: "output_matches"
        pattern: "(pending.*model|HasData|DateTime|non-deterministic)"
      - type: "output_matches"
        pattern: "(\\$type|Discriminator|discriminator)"
    rubric:
      - "Identifies MigrateAsync inside explicit transaction now throws; recommends removing external transaction"
      - "Identifies DateTime.UtcNow in HasData causes pending model changes exception; recommends static values"
      - "Identifies Cosmos DB discriminator renamed from 'Discriminator' to '$type'; shows HasDiscriminator mitigation"
      - "Warns that sync I/O on Cosmos DB provider now throws; must use async equivalents"
      - "Mentions Microsoft.EntityFrameworkCore.Design may not be found; shows Publish=true workaround"
    timeout: 240

  # --- Scenario 5: Cryptography — X509Certificate2 obsolete constructors ---
  - name: "App loading certificates with obsolete X509Certificate2 constructors"
    prompt: |
      I'm migrating a .NET 8 app to .NET 9. It loads certificates in several ways:
      ```csharp
      var cert1 = new X509Certificate2(File.ReadAllBytes("cert.pfx"), "password");
      var cert2 = new X509Certificate2("cert.pem");
      var certs = new X509Certificate2Collection();
      certs.Import(pfxBytes, "password", X509KeyStorageFlags.MachineKeySet);
      ```
      Also, it uses Thread.VolatileRead to read a shared counter in a multithreaded scenario.
      What warnings or errors will I get?
    assertions:
      - type: "output_matches"
        pattern: "(SYSLIB0057|X509Certificate|obsolete|X509CertificateLoader)"
      - type: "output_matches"
        pattern: "(SYSLIB0054|VolatileRead|Volatile\\.Read)"
    rubric:
      - "Identifies SYSLIB0057 for X509Certificate2 constructors and Import; recommends X509CertificateLoader.LoadPkcs12 and LoadCertificateFromFile"
      - "Identifies SYSLIB0054 for Thread.VolatileRead; recommends Volatile.Read"
    timeout: 180

  # --- Scenario 6: Serialization — JsonDocument null, BinaryFormatter, JSON metadata ---
  - name: "App with JsonDocument null deserialization and BinaryFormatter fallback"
    prompt: |
      I'm upgrading a .NET 8 app to .NET 9. Here's code that might break:

      ```csharp
      // NullDocHandler.cs
      var doc = JsonSerializer.Deserialize<JsonDocument>("null");
      if (doc is null)
      {
          Console.WriteLine("Got null document");
          return;
      }
      ProcessDocument(doc);
      ```

      ```csharp
      // CacheService.cs
      AppContext.SetSwitch("System.Runtime.Serialization.EnableUnsafeBinaryFormatterSerialization", true);
      var formatter = new BinaryFormatter();
      formatter.Serialize(stream, sessionData);  // was working in .NET 8 with the switch
      ```

      ```csharp
      // ApiClient.cs
      var request = new HttpListenerRequest();
      var userAgent = request.UserAgent;
      logger.LogInformation("UA length: {Length}", userAgent.Length);  // no null check
      ```

      What breaks?
    assertions:
      - type: "output_matches"
        pattern: "(JsonDocument|null|JsonValueKind\\.Null|non-null)"
      - type: "output_matches"
        pattern: "(BinaryFormatter|NotSupportedException|always throws)"
      - type: "output_matches"
        pattern: "(UserAgent|nullable|null check|string\\?)"
    rubric:
      - "Identifies JsonDocument deserialization of 'null' now returns non-null document instead of null; code path changes"
      - "Identifies BinaryFormatter always throws even with the AppContext switch; switch is removed"
      - "Identifies HttpListenerRequest.UserAgent is now nullable; .Length without null check may throw"
    timeout: 180

  # --- Scenario 7: SDK/MSBuild — Terminal Logger, version requirements, warnings ---
  - name: "CI pipeline with Terminal Logger parsing and version constraints"
    prompt: |
      I'm upgrading our CI/CD pipeline to .NET 9 SDK. We have:
      - A CI script that parses the output of `dotnet build` looking for specific warning patterns using regex
      - Visual Studio 2022 17.11 on developer machines
      - A multi-targeted library with net7.0 and net8.0 targets
      - Some projects still targeting netstandard1.6
      - Our CI runs `dotnet workload list` and parses the output to verify installed workloads
      - We use `dotnet watch` for local development while targeting net8.0
      What issues will we encounter?
    assertions:
      - type: "output_matches"
        pattern: "(Terminal Logger|--tl|MSBUILDTERMINALLOGGER|console.*output)"
      - type: "output_matches"
        pattern: "(17\\.12|17\\.11|Visual Studio|NETSDK1223)"
      - type: "output_matches"
        pattern: "(net7\\.0|warning|.NET Standard|netstandard)"
    rubric:
      - "Identifies Terminal Logger changes build output format; recommends --tl:off for CI scripts"
      - "Warns that VS 17.11 cannot target net9.0; requires 17.12+"
      - "Notes net7.0 targets produce warnings since .NET 7 is out of support"
      - "Notes netstandard1.x targets produce warnings"
      - "Mentions dotnet workload output format changed"
      - "Mentions dotnet watch incompatibility with Hot Reload for older frameworks"
    timeout: 240

  # --- Scenario 8: WinForms — Security analyzers, StatusStrip, PictureBox ---
  - name: "WinForms app with custom UserControls and PictureBox URL loading"
    prompt: |
      I'm upgrading a .NET 8 WinForms app to .NET 9. The app has:
      - Custom UserControls with public properties that don't have DesignerSerializationVisibilityAttribute
      - A PictureBox that loads images from URLs with a catch block for WebException
      - StatusStrip controls with default rendering
      - Code that uses IWindowsFormsEditorService.DropDownControl and passes null sometimes
      - The project also references some COM components and uses P/Invoke with native libraries
      What breaks?
    assertions:
      - type: "output_matches"
        pattern: "(WFO1000|security analyz|serialization|DesignerSerializationVisibility)"
      - type: "output_matches"
        pattern: "(PictureBox|HttpRequestException|WebException)"
      - type: "output_matches"
        pattern: "(StatusStrip|render|default)"
    rubric:
      - "Identifies WFO1000 security analyzer errors for properties without serialization configuration"
      - "Warns PictureBox now throws HttpRequestException instead of WebException"
      - "Mentions StatusStrip default renderer changed"
      - "Identifies DropDownControl parameter is now non-nullable — passing null will warn"
      - "Mentions CET support may affect P/Invoke with incompatible native libraries"
    timeout: 180

  # --- Scenario 9: Containers and deployment — zlib, env var precedence, Monitor images ---
  - name: "Containerized app with zlib dependency and runtime configuration"
    prompt: |
      I'm migrating a .NET 8 containerized app to .NET 9. Our setup:

      ```dockerfile
      FROM mcr.microsoft.com/dotnet/aspnet:8.0 AS base
      # We don't explicitly install zlib — our image processing library depends on it
      ```

      ```json
      // runtimeconfig.template.json
      {
        "configProperties": {
          "System.GC.Server": true,
          "System.Threading.ThreadPool.MinThreads": 50
        }
      }
      ```

      In our Kubernetes deployment, we set:
      - DOTNET_gcServer=0 (to reduce memory on small pods)
      - DOTNET_ThreadPool_MinThreads=4

      In .NET 8, the runtimeconfig.json values took precedence. The app uses .NET Monitor with specific image tags.
      We also have `global.json` pinned to 8.0.300.
      What needs to change?
    assertions:
      - type: "output_matches"
        pattern: "(zlib|no longer install|apt-get|zlib1g)"
      - type: "output_matches"
        pattern: "(environment variable|precedence|runtimeconfig|override)"
      - type: "output_matches"
        pattern: "(global\\.json|SDK|9\\.0)"
    rubric:
      - "Identifies zlib is no longer installed in .NET 9 images; recommends adding apt-get install"
      - "Explains environment variables now take precedence over runtimeconfig.json — GC and ThreadPool settings will use env var values"
      - "Warns about .NET Monitor image tag format changes"
      - "Notes global.json should be updated to 9.0.x SDK"
    timeout: 180

  # --- Scenario 10: EF Core Cosmos DB — comprehensive Cosmos changes ---
  - name: "EF Core Cosmos DB app with discriminator and sync I/O"
    prompt: |
      I'm migrating a .NET 8 app that uses EF Core with the Azure Cosmos DB provider. The codebase:
      - Has existing documents in Cosmos DB with a "Discriminator" property
      - Uses `SaveChanges()` (sync) in a background job
      - Has raw SQL queries like `SELECT * FROM c WHERE c.Discriminator = 'Blog'`
      - Uses `HasIndex(b => b.Name)` on a Cosmos entity
      - Has documents where the id is in format `"Blog|1"` (discriminator + key)
      - Uses `context.Blogs.ToList()` in several places
      What breaks in EF Core 9 and how do I fix each?
    assertions:
      - type: "output_matches"
        pattern: "(\\$type|Discriminator|discriminator.*renamed)"
      - type: "output_matches"
        pattern: "(sync|synchronous|SaveChanges|ToList|async)"
      - type: "output_matches"
        pattern: "(HasIndex|throws|ignored)"
    rubric:
      - "Identifies discriminator property renamed from 'Discriminator' to '$type'; shows HasDiscriminator('Discriminator') mitigation"
      - "Identifies id property no longer contains discriminator — existing documents have 'Blog|1' format but new ones will be '1'"
      - "Identifies sync I/O throws — SaveChanges must become SaveChangesAsync, ToList must become ToListAsync"
      - "Identifies HasIndex now throws instead of being silently ignored"
      - "Warns that SQL queries using c.Discriminator need updating to c.$type or use VALUE projection"
    timeout: 240

  # --- Scenario 11: Mixed — String.Trim removal, keyed services, InlineArray size ---
  - name: "Library with String.Trim span overload, keyed services, and InlineArray"
    prompt: |
      I'm upgrading a .NET 8 class library and web API to .NET 9. It:
      - Was compiled against .NET 9 RC2 and uses `str.Trim(mySpan)` where mySpan is a `ReadOnlySpan<char>`
      - Has keyed services where `[FromKeyedServices("cache")]` decorates a parameter, but the service is only registered as a non-keyed `ICache`
      - Has an `[InlineArray(1024)]` struct that also has `[StructLayout(LayoutKind.Sequential, Size = 8192)]`
      - Uses `HttpListenerRequest.UserAgent.Length` without null checks
      What issues will I encounter?
    assertions:
      - type: "output_matches"
        pattern: "(Trim|ReadOnlySpan|char\\[\\]|removed|MissingMethodException)"
      - type: "output_matches"
        pattern: "(keyed|non-keyed|FromKeyedServices|InvalidOperationException)"
      - type: "output_matches"
        pattern: "(InlineArray|size|1 MiB|limit)"
    rubric:
      - "Identifies String.Trim(ReadOnlySpan<char>) was removed in GA; code compiled against RC2 will get MissingMethodException; must rebuild with char[]"
      - "Identifies FromKeyedServicesAttribute no longer falls back to non-keyed service; throws InvalidOperationException"
      - "Warns about InlineArray struct size limit enforcement (1 MiB)"
      - "Identifies HttpListenerRequest.UserAgent is now nullable"
    timeout: 180

  # --- Scenario 12: Runtime behavior — env var precedence, empty env vars, ZipArchive encoding ---
  - name: "App with runtime config conflicts and ZipArchive encoding"
    prompt: |
      I'm migrating a .NET 8 app to .NET 9. I have these concerns:
      - My app sets `System.GC.Server=true` in runtimeconfig.json. In deployment, the env var `DOTNET_gcServer=0` is set by the orchestrator. In .NET 8 we got server GC. What happens in .NET 9?
      - I check for an empty environment variable `MY_FLAG` — in .NET 8 it was treated as "not set". Is this still the case?
      - I create ZIP archives with non-ASCII filenames (Japanese characters) and the receiving system expects them in Shift-JIS encoding
      - I deserialize JSON `null` into a `JsonDocument?` property and check `if (doc == null)` to detect missing data
      What changes?
    assertions:
      - type: "output_matches"
        pattern: "(environment variable|precedence|runtimeconfig|DOTNET_gcServer)"
      - type: "output_matches"
        pattern: "(empty.*environment|supported|unset)"
      - type: "output_matches"
        pattern: "(ZipArchive|UTF.?8|encoding|flag)"
    rubric:
      - "Correctly states environment variable now takes precedence — app will use workstation GC (DOTNET_gcServer=0 wins)"
      - "Correctly states empty environment variables are now supported and no longer treated as unset"
      - "Warns about ZipArchiveEntry names/comments now respecting UTF-8 flag which may change encoding behavior"
      - "Warns about JsonDocument deserialization returning non-null for JSON 'null'"
    timeout: 180
