scenarios:
  - name: "Refactor synchronous service to async"
    prompt: "I have a service class with several synchronous database and HTTP calls. It's causing thread pool starvation under load. Can you convert it to async/await?"
    setup:
      copy_test_files: true
    assertions:
      - type: "output_matches"
        pattern: "(async|await|Task<)"
      - type: "output_matches"
        pattern: "(CancellationToken|cancellation)"
      - type: "output_not_matches"
        pattern: "\\.Result\\b(?=\\s*[);])|\\.Wait\\(\\)(?=\\s*[);])"
    rubric:
      - "Identified all synchronous blocking I/O patterns (.Result, .Wait(), synchronous Read/Write calls)"
      - "Converted methods bottom-up starting from the lowest-level I/O calls"
      - "Changed method signatures to return Task or Task<T> with Async suffix"
      - "Added CancellationToken parameter propagation throughout the call chain"
      - "Updated interfaces to match the async method signatures"
      - "Did not introduce async void methods (except event handlers)"
      - "Verified the code compiles after conversion with dotnet build"
    expect_tools: ["bash"]
    timeout: 120

  - name: "Async refactoring should not apply to CPU-bound code"
    prompt: "This method is really slow and blocking my app. Can you make DoIt() async so it runs faster?"
    expect_activation: false
    setup:
      files:
        - path: "MatrixMultiplier.cs"
          content: |
            namespace MatrixOps;

            public class MatrixMultiplier
            {
                public double[,] Multiply(double[,] a, double[,] b)
                {
                    int rows = a.GetLength(0);
                    int cols = b.GetLength(1);
                    int inner = a.GetLength(1);
                    var result = new double[rows, cols];

                    for (int i = 0; i < rows; i++)
                    {
                        for (int j = 0; j < cols; j++)
                        {
                            double sum = 0;
                            for (int k = 0; k < inner; k++)
                            {
                                sum += a[i, k] * b[k, j];
                            }
                            result[i, j] = sum;
                        }
                    }

                    return result;
                }
            }
        - path: "MatrixMultiplier.csproj"
          content: |
            <Project Sdk="Microsoft.NET.Sdk">
              <PropertyGroup>
                <TargetFramework>net10.0</TargetFramework>
                <Nullable>enable</Nullable>
              </PropertyGroup>
            </Project>
    assertions:
      - type: "output_not_matches"
        pattern: "(\\basync\\s+Task\\b.*\\(|await.*ReadAsync|await.*WriteAsync)"
    rubric:
      - "Did NOT suggest converting CPU-bound computation to async/await"
      - "Suggested parallelism approaches (Parallel.For, Task.Run, SIMD, or algorithmic optimization)"
      - "Correctly identified that async is for I/O-bound work, not CPU-bound work"
    timeout: 120

  - name: "Fix sync-over-async deadlock in WPF app"
    prompt: |
      My WPF app freezes when I click a button. The click handler calls a method that uses .Result to get data from an API. How do I fix this deadlock?

      ```csharp
      private void OnButtonClick(object sender, RoutedEventArgs e)
      {
          var data = GetDataFromApi().Result; // UI freezes here
          DataLabel.Text = data;
      }

      private async Task<string> GetDataFromApi()
      {
          var response = await _httpClient.GetAsync("/api/data");
          return await response.Content.ReadAsStringAsync();
      }
      ```
    setup:
      files:
        - path: "MainWindow.xaml.cs"
          content: |
            using System.Net.Http;
            using System.Windows;

            namespace WpfApp;

            public partial class MainWindow : Window
            {
                private readonly HttpClient _httpClient = new();

                public MainWindow()
                {
                    InitializeComponent();
                }

                private void OnButtonClick(object sender, RoutedEventArgs e)
                {
                    var data = GetDataFromApi().Result;
                    DataLabel.Text = data;
                }

                private async Task<string> GetDataFromApi()
                {
                    var response = await _httpClient.GetAsync("/api/data");
                    return await response.Content.ReadAsStringAsync();
                }
            }
        - path: "WpfApp.csproj"
          content: |
            <Project Sdk="Microsoft.NET.Sdk">
              <PropertyGroup>
                <TargetFramework>net8.0-windows</TargetFramework>
                <OutputType>WinExe</OutputType>
                <UseWPF>true</UseWPF>
              </PropertyGroup>
            </Project>
    assertions:
      - type: "output_matches"
        pattern: "(async void|async.*RoutedEventArgs|await.*GetDataFromApi)"
      - type: "output_matches"
        pattern: "(SynchronizationContext|deadlock|UI thread|synchronization context)"
    rubric:
      - "Identified the root cause: .Result blocks the UI thread while the awaited task needs the UI SynchronizationContext to resume, causing a deadlock"
      - "Made the event handler async void (the one valid use of async void — UI event handlers)"
      - "Replaced .Result with await in the event handler"
      - "Explained that the fix works because await releases the UI thread instead of blocking it"
    timeout: 120

  - name: "Convert file I/O operations to async"
    prompt: "Convert this file processing class to async. It reads CSV files, processes them, and writes output files."
    setup:
      files:
        - path: "FileProcessor.cs"
          content: |
            namespace DataPipeline;

            public class FileProcessor
            {
                public void ProcessFile(string inputPath, string outputPath)
                {
                    var lines = File.ReadAllLines(inputPath);
                    var results = new List<string>();

                    foreach (var line in lines)
                    {
                        if (string.IsNullOrWhiteSpace(line)) continue;
                        var parts = line.Split(',');
                        var processed = string.Join("|", parts.Select(p => p.Trim().ToUpperInvariant()));
                        results.Add(processed);
                    }

                    File.WriteAllLines(outputPath, results);
                }

                public string ReadConfig(string configPath)
                {
                    if (!File.Exists(configPath))
                        throw new FileNotFoundException($"Config not found: {configPath}");

                    return File.ReadAllText(configPath);
                }

                public void AppendLog(string logPath, string message)
                {
                    var entry = $"[{DateTime.UtcNow:O}] {message}\n";
                    File.AppendAllText(logPath, entry);
                }
            }
        - path: "DataPipeline.csproj"
          content: |
            <Project Sdk="Microsoft.NET.Sdk">
              <PropertyGroup>
                <TargetFramework>net8.0</TargetFramework>
                <Nullable>enable</Nullable>
                <ImplicitUsings>enable</ImplicitUsings>
              </PropertyGroup>
            </Project>
    assertions:
      - type: "output_matches"
        pattern: "(ReadAllLinesAsync|ReadAllTextAsync|WriteAllLinesAsync|AppendAllTextAsync)"
      - type: "output_matches"
        pattern: "(async Task|CancellationToken)"
    rubric:
      - "Converted File.ReadAllLines to File.ReadAllLinesAsync"
      - "Converted File.WriteAllLines to File.WriteAllLinesAsync"
      - "Converted File.ReadAllText to File.ReadAllTextAsync"
      - "Converted File.AppendAllText to File.AppendAllTextAsync"
      - "Added CancellationToken parameter to all async methods"
      - "Added Async suffix to method names"
    timeout: 120

  - name: "Partial async conversion in large codebase"
    prompt: "I need to convert just the data access layer to async. The business logic layer and API controllers should stay synchronous for now — we're doing a staged migration."
    setup:
      copy_test_files: true
    assertions:
      - type: "output_matches"
        pattern: "(async|await|Task<)"
    rubric:
      - "Converted only the data access methods (repository layer) to async"
      - "Did NOT convert business logic or controller layers in this stage"
      - "Discussed or warned about the temporary sync-over-async bridge needed at the boundary"
      - "Mentioned that .Result or .GetAwaiter().GetResult() at the boundary is a temporary compromise"
      - "Recommended completing the full async chain as a follow-up"
    timeout: 120
