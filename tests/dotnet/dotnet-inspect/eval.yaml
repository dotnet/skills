scenarios:
  - name: "Port app to latest System.CommandLine version"
    prompt: |
      Clone https://github.com/richlander/bad-code and look at the ZeroDaySearch project.
      This app uses a beta version of System.CommandLine. Upgrade it to the latest stable version.
    assertions:
      - type: "output_matches"
        pattern: "(diff|member|type)"
      - type: "file_contains"
        path: "**/ZeroDaySearch.csproj"
        value: "System.CommandLine"
      - type: "exit_success"
    expect_tools: ["bash"]
    rubric:
      - "Updates the PackageReference to the latest stable System.CommandLine version (2.0.4)"
      - "Correctly migrates Handler.SetHandler calls to the new System.CommandLine API (e.g., SetAction)"
      - "The project compiles successfully after migration"
      - "All seven subcommands (list, search, severity, product, platform, date, summary) are preserved"
    timeout: 600

  - name: "Find types across platform libraries"
    prompt: "Where is INumber defined in .NET? What other numeric interfaces are nearby?"
    assertions:
      - type: "output_matches"
        pattern: "INumber"
    expect_tools: ["bash"]
    rubric:
      - "Identifies that INumber is in the System.Runtime library (System.Numerics namespace)"
      - "Lists related numeric interfaces (e.g., IAdditionOperators, IFloatingPoint, IBinaryInteger)"
      - "Shows at least 5 distinct numeric interfaces from the same namespace or library"
    timeout: 120

  - name: "Find types in a NuGet package"
    prompt: "What's the IChatClient interface in Microsoft.Extensions.AI? Show me its API surface."
    assertions:
      - type: "output_matches"
        pattern: "IChatClient"
    expect_tools: ["bash"]
    rubric:
      - "Shows the members of IChatClient (e.g., GetResponseAsync, GetStreamingResponseAsync)"
      - "Identifies that IChatClient is in the Microsoft.Extensions.AI package and namespace"
      - "Provides a useful summary of the interface's purpose and shape"
    timeout: 240

  - name: "Find extension methods for a type"
    prompt: "What extension methods are available for HttpClient in .NET?"
    assertions:
      - type: "output_matches"
        pattern: "(extension|HttpClient)"
    expect_tools: ["bash"]
    rubric:
      - "Lists extension methods from System.Net.Http.Json (e.g., GetFromJsonAsync, PostAsJsonAsync)"
      - "Identifies the library or namespace each extension method comes from"
      - "Presents the results clearly, grouped or summarized by source"
    timeout: 120

  - name: "Discover interfaces in a NuGet package"
    prompt: "Which interfaces are defined in the System.Text.Json NuGet package? Show me the complete set."
    assertions:
      - type: "output_contains"
        value: "JsonConverter"
    expect_tools: ["bash"]
    rubric:
      - "Lists the complete set of interfaces in System.Text.Json (e.g., IJsonTypeInfoResolver, IJsonOnSerializing, IJsonOnDeserialized)"
      - "Includes interfaces from both the System.Text.Json and System.Text.Json.Serialization namespaces"
      - "Results are accurate and comprehensive, not a partial list from memory"
    timeout: 120

  - name: "Find logging and tracing types across platform"
    prompt: "I'm building an observability layer. Find all the ILogger*, Activity*, and Meter* types in the .NET platform. I need the full picture."
    assertions:
      - type: "output_matches"
        pattern: "(ILogger|Activity|Meter)"
    expect_tools: ["bash"]
    rubric:
      - "Lists types from all three observability families: logging (ILogger*), tracing (Activity*), and metrics (Meter*)"
      - "Identifies the platform libraries each type comes from (e.g., Microsoft.Extensions.Logging.Abstractions, System.Diagnostics.DiagnosticSource)"
      - "Results are comprehensive — covers at least 3 types per family, not just the top-level ones"
    timeout: 120

  - name: "Find implementors of an interface"
    prompt: "What types implement IHostedService in the .NET platform? I want to know what's built-in."
    assertions:
      - type: "output_matches"
        pattern: "IHostedService"
    expect_tools: ["bash"]
    rubric:
      - "Lists concrete types that implement IHostedService from the .NET platform or extensions packages"
      - "Identifies the library or package each implementor comes from"
      - "Results reflect actual platform assemblies, not hypothetical or user-space implementations"
    timeout: 120

  - name: "Inspect package dependency chain"
    prompt: "What are the package dependencies of Microsoft.Extensions.AI? I want to understand what it pulls in."
    assertions:
      - type: "output_matches"
        pattern: "(depend|Microsoft\\.Extensions)"
    expect_tools: ["bash"]
    rubric:
      - "Lists the direct dependencies of Microsoft.Extensions.AI (e.g., Microsoft.Extensions.AI.Abstractions, Microsoft.Bcl.AsyncInterfaces)"
      - "Provides version information for the dependencies"
      - "Gives a clear picture of the full dependency tree or transitive closure, not just top-level names"
    timeout: 120

  - name: "Inspect method overloads in a NuGet package"
    prompt: "Which overloads of GetResponseAsync in Microsoft.Extensions.AI accept a JsonSerializerOptions parameter? Show me their full signatures."
    assertions:
      - type: "output_matches"
        pattern: "JsonSerializerOptions"
    expect_tools: ["bash"]
    rubric:
      - "Identifies the overloads of GetResponseAsync that accept a JsonSerializerOptions parameter (3 of the 6 overloads)"
      - "Shows full method signatures including return types and all parameters for the matching overloads"
      - "Distinguishes the matching overloads from the ones that do not accept JsonSerializerOptions"
    timeout: 120

  - name: "Audit package signing and SourceLink"
    prompt: "Is the Newtonsoft.Json NuGet package signed? Does it support SourceLink? Give me the full metadata."
    assertions:
      - type: "output_matches"
        pattern: "(Newtonsoft|sign|source)"
    expect_tools: ["bash"]
    rubric:
      - "Reports whether the Newtonsoft.Json assembly is signed and provides its public key token"
      - "Reports SourceLink status (whether source is available for debugging)"
      - "Includes additional package metadata such as version, target frameworks, or author information"
    timeout: 120

  - name: "Review source for hash collision protection"
    prompt: "Where is Dictionary's source code in the .NET platform? Get the SourceLink URLs and show me how it handles hash collisions."
    assertions:
      - type: "output_matches"
        pattern: "(Dictionary|hash|collision)"
    expect_tools: ["bash"]
    rubric:
      - "Response includes a URL pointing to Dictionary.cs in the dotnet/dotnet or dotnet/runtime repository with a specific commit SHA in the path"
      - "Correctly explains that Dictionary uses separate chaining via an Entry struct array with a next field forming an embedded linked list"
      - "Describes the defensive behavior when excessive collisions are detected with string keys, including switching to a randomized equality comparer"
    timeout: 180
