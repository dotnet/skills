scenarios:
  - name: "Port app to latest System.CommandLine version"
    prompt: |
      Clone https://github.com/richlander/bad-code and look at the ZeroDaySearch project.
      This app uses a beta version of System.CommandLine. Upgrade it to the latest stable version.
    assertions:
      - type: "output_matches"
        pattern: "(diff|member|type)"
      - type: "file_contains"
        path: "**/ZeroDaySearch.csproj"
        value: "System.CommandLine"
      - type: "exit_success"
    expect_tools: ["bash"]
    rubric:
      - "Updates the PackageReference to the latest stable System.CommandLine version discovered during the run"
      - "Correctly migrates Handler.SetHandler calls to the new System.CommandLine API (e.g., SetAction)"
      - "The project compiles successfully after migration"
      - "All seven subcommands (list, search, severity, product, platform, date, summary) are preserved"
    timeout: 600

  - name: "Find types across platform libraries"
    prompt: "Where is INumber defined in .NET? What other numeric interfaces are nearby?"
    assertions:
      - type: "output_matches"
        pattern: "INumber"
    expect_tools: ["bash"]
    rubric:
      - "Identifies that INumber is in the System.Runtime library (System.Numerics namespace)"
      - "Lists related numeric interfaces (e.g., IAdditionOperators, IFloatingPoint, IBinaryInteger)"
      - "Shows at least 5 distinct numeric interfaces from the same namespace or library"
    timeout: 120

  - name: "Find types in a NuGet package"
    prompt: "What's the IChatClient interface in Microsoft.Extensions.AI? Show me its API surface."
    assertions:
      - type: "output_matches"
        pattern: "IChatClient"
    expect_tools: ["bash"]
    rubric:
      - "Shows the 3 members of IChatClient: GetResponseAsync (returns Task<ChatResponse>), GetStreamingResponseAsync (returns IAsyncEnumerable<ChatResponseUpdate>), and GetService (returns object?)"
      - "Identifies that IChatClient is in the Microsoft.Extensions.AI.Abstractions package (Microsoft.Extensions.AI namespace)"
      - "Provides a useful summary of the interface's purpose and shape"
    timeout: 240

  - name: "Find extension methods for a type"
    prompt: "What extension methods are available for HttpClient in .NET?"
    assertions:
      - type: "output_matches"
        pattern: "(extension|HttpClient)"
    expect_tools: ["bash"]
    rubric:
      - "Lists HttpClient extension methods from System.Net.Http.Json including GetFromJsonAsync, PostAsJsonAsync, PutAsJsonAsync, PatchAsJsonAsync, DeleteFromJsonAsync, and GetFromJsonAsAsyncEnumerable"
      - "Identifies that these extensions come from HttpClientJsonExtensions in the System.Net.Http.Json library"
      - "Presents the results clearly, grouped or summarized by source"
    timeout: 120

  - name: "Discover interfaces in a NuGet package"
    prompt: "Which interfaces are defined in the System.Text.Json NuGet package? Show me the complete set."
    assertions:
      - type: "output_contains"
        value: "IJsonTypeInfoResolver"
    expect_tools: ["bash"]
    rubric:
      - "Lists the complete set of 5 interfaces: IJsonTypeInfoResolver (in System.Text.Json.Serialization.Metadata), and IJsonOnDeserialized, IJsonOnDeserializing, IJsonOnSerialized, IJsonOnSerializing (all in System.Text.Json.Serialization)"
      - "Includes interfaces from both System.Text.Json.Serialization.Metadata and System.Text.Json.Serialization namespaces"
      - "Results are accurate and comprehensive, not a partial list from memory"
    timeout: 120

  - name: "Find logging and tracing types across platform"
    prompt: "I'm building an observability layer. Find all the ILogger*, Activity*, and Meter* types in the .NET platform. I need the full picture."
    assertions:
      - type: "output_matches"
        pattern: "(ILogger|Activity|Meter)"
    expect_tools: ["bash"]
    rubric:
      - "Lists types from all three observability families: logging (ILogger*), tracing (Activity*), and metrics (Meter*)"
      - "Identifies the platform libraries each type comes from (e.g., Microsoft.Extensions.Logging.Abstractions, System.Diagnostics.DiagnosticSource)"
      - "Results are comprehensive — covers at least 3 types per family, not just the top-level ones"
    timeout: 120

  - name: "Find implementors of an interface"
    prompt: "What types implement IHostedService in the .NET platform? I want to know what's built-in."
    assertions:
      - type: "output_matches"
        pattern: "IHostedService"
    expect_tools: ["bash"]
    rubric:
      - "Lists BackgroundService as the primary concrete implementor of IHostedService (in Microsoft.Extensions.Hosting.Abstractions from aspnetcore). IHostedLifecycleService is an interface that extends IHostedService, not a concrete implementor."
      - "Identifies the library or package each implementor comes from (Microsoft.Extensions.Hosting.Abstractions is the key library)"
      - "Results are grounded in actual platform data, not fabricated types — the platform only contains BackgroundService and IHostedLifecycleService as public types related to IHostedService"
    timeout: 120

  - name: "Inspect package dependency chain"
    prompt: "What are the package dependencies of Microsoft.Extensions.AI? I want to understand what it pulls in."
    assertions:
      - type: "output_matches"
        pattern: "(depend|Microsoft\\.Extensions)"
    expect_tools: ["bash"]
    rubric:
      - "Lists the 5 direct dependencies for net10.0: Microsoft.Extensions.AI.Abstractions, Microsoft.Extensions.Caching.Abstractions, Microsoft.Extensions.DependencyInjection.Abstractions, Microsoft.Extensions.Logging.Abstractions, and System.Numerics.Tensors"
      - "Provides version information (e.g., AI.Abstractions 10.4.0, other deps at 10.0.4)"
      - "Shows transitive dependencies or the deeper tree — e.g., Caching.Abstractions pulls in Microsoft.Extensions.Primitives, or for net9.0 there are additional direct deps like System.Text.Json and System.Threading.Channels"
    timeout: 120

  - name: "Inspect method overloads in a NuGet package"
    prompt: "Which overloads of GetResponseAsync in Microsoft.Extensions.AI accept a JsonSerializerOptions parameter? Show me their full signatures."
    assertions:
      - type: "output_matches"
        pattern: "JsonSerializerOptions"
    expect_tools: ["bash"]
    rubric:
      - "Identifies the 3 overloads that accept JsonSerializerOptions: one taking string, one taking ChatMessage, and one taking IEnumerable<ChatMessage> — all on ChatClientStructuredOutputExtensions"
      - "Shows full method signatures including the return type Task<ChatResponse<T>> and all parameters (chatClient, message input, serializerOptions, options?, useJsonSchemaResponseFormat?, cancellationToken)"
      - "Distinguishes the 3 matching overloads from the 3 that do not accept JsonSerializerOptions (which are otherwise identical but omit the serializerOptions parameter)"
    timeout: 120

  - name: "Audit package signing and SourceLink"
    prompt: "Is the Newtonsoft.Json NuGet package signed? Does it support SourceLink? Give me the full metadata."
    assertions:
      - type: "output_matches"
        pattern: "(Newtonsoft|sign|source)"
    expect_tools: ["bash"]
    rubric:
      - "Reports that the Newtonsoft.Json assembly is signed with public key token 11425bc5744002c7"
      - "Reports that Newtonsoft.Json does NOT have SourceLink (no readable PDB embedded)"
      - "Includes additional metadata such as version (13.0.4), author (James Newton-King), license (MIT), or target frameworks (net6.0, netstandard2.0, etc.)"
    timeout: 120

  - name: "Review source for hash collision protection"
    prompt: "Where is Dictionary's source code in the .NET platform? Get the SourceLink URLs and show me how it handles hash collisions."
    assertions:
      - type: "output_matches"
        pattern: "(Dictionary|hash|collision)"
    expect_tools: ["bash"]
    rubric:
      - "Response includes a URL pointing to Dictionary.cs in the dotnet/dotnet or dotnet/runtime repository with a specific commit SHA in the path"
      - "Correctly explains that Dictionary uses separate chaining via an Entry struct array with a next field forming an embedded linked list"
      - "Describes the defensive behavior when excessive collisions are detected with string keys, including switching to a randomized equality comparer"
    timeout: 180
