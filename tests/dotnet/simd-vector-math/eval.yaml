scenarios:
  - name: "Optimize weighted Euclidean distance"
    prompt: "This .NET 8 project has a weighted Euclidean distance method used in a recommendation engine that computes similarity scores with per-dimension feature weights. The vectors are typically 512-dimensional float arrays and the method is called thousands of times per query. It's currently a bottleneck. Please optimize WeightedEuclideanDistance for maximum throughput. Keep the same public API and make sure all existing tests still pass."
    setup:
      files:
        - path: "WeightedDist/WeightedDist.csproj"
          content: |
            <Project Sdk="Microsoft.NET.Sdk">
              <PropertyGroup>
                <TargetFramework>net8.0</TargetFramework>
                <Nullable>enable</Nullable>
                <ImplicitUsings>enable</ImplicitUsings>
              </PropertyGroup>
            </Project>
        - path: "WeightedDist/VectorOps.cs"
          content: |
            namespace WeightedDist;

            public static class VectorOps
            {
                /// <summary>
                /// Computes the weighted Euclidean distance between two float arrays.
                /// Each dimension's squared difference is multiplied by the corresponding weight.
                /// </summary>
                public static float WeightedEuclideanDistance(ReadOnlySpan<float> a, ReadOnlySpan<float> b, ReadOnlySpan<float> weights)
                {
                    if (a.Length != b.Length || a.Length != weights.Length)
                        throw new ArgumentException("All arrays must have the same length.");

                    float sum = 0f;
                    for (int i = 0; i < a.Length; i++)
                    {
                        float diff = a[i] - b[i];
                        sum += weights[i] * diff * diff;
                    }
                    return MathF.Sqrt(sum);
                }
            }
        - path: "WeightedDist.Tests/WeightedDist.Tests.csproj"
          content: |
            <Project Sdk="Microsoft.NET.Sdk">
              <PropertyGroup>
                <TargetFramework>net8.0</TargetFramework>
                <Nullable>enable</Nullable>
                <ImplicitUsings>enable</ImplicitUsings>
                <IsPackable>false</IsPackable>
                <IsTestProject>true</IsTestProject>
              </PropertyGroup>
              <ItemGroup>
                <PackageReference Include="Microsoft.NET.Test.Sdk" Version="17.8.0" />
                <PackageReference Include="xunit" Version="2.9.0" />
                <PackageReference Include="xunit.runner.visualstudio" Version="2.8.2" />
              </ItemGroup>
              <ItemGroup>
                <ProjectReference Include="..\WeightedDist\WeightedDist.csproj" />
              </ItemGroup>
            </Project>
        - path: "WeightedDist.Tests/VectorOpsTests.cs"
          content: |
            using WeightedDist;

            namespace WeightedDist.Tests;

            public class VectorOpsTests
            {
                [Fact]
                public void SameVectors_ReturnsZero()
                {
                    var v = new float[] { 1f, 2f, 3f };
                    var w = new float[] { 1f, 1f, 1f };
                    Assert.Equal(0f, VectorOps.WeightedEuclideanDistance(v, v, w), 5);
                }

                [Fact]
                public void UnitWeights_MatchesStandardL2()
                {
                    var a = new float[] { 0f, 0f };
                    var b = new float[] { 3f, 4f };
                    var w = new float[] { 1f, 1f };
                    Assert.Equal(5f, VectorOps.WeightedEuclideanDistance(a, b, w), 5);
                }

                [Fact]
                public void ZeroWeight_IgnoresDimension()
                {
                    var a = new float[] { 0f, 0f };
                    var b = new float[] { 100f, 4f };
                    var w = new float[] { 0f, 1f };
                    Assert.Equal(4f, VectorOps.WeightedEuclideanDistance(a, b, w), 5);
                }

                [Fact]
                public void DifferentLengths_Throws()
                {
                    Assert.Throws<ArgumentException>(() =>
                        VectorOps.WeightedEuclideanDistance(new float[] { 1f }, new float[] { 1f, 2f }, new float[] { 1f }));
                }

                [Fact]
                public void LargeVectors()
                {
                    var rng = new Random(42);
                    var a = Enumerable.Range(0, 512).Select(_ => (float)(rng.NextDouble() * 2 - 1)).ToArray();
                    var b = Enumerable.Range(0, 512).Select(_ => (float)(rng.NextDouble() * 2 - 1)).ToArray();
                    var w = Enumerable.Range(0, 512).Select(_ => (float)rng.NextDouble()).ToArray();

                    float expected = 0f;
                    for (int i = 0; i < a.Length; i++) { float d = a[i] - b[i]; expected += w[i] * d * d; }
                    expected = MathF.Sqrt(expected);

                    Assert.Equal(expected, VectorOps.WeightedEuclideanDistance(a, b, w), 2);
                }

                [Fact]
                public void ShortVector_BelowVectorWidth()
                {
                    var a = new float[] { 1f, 0f };
                    var b = new float[] { 0f, 1f };
                    var w = new float[] { 4f, 9f };
                    // sqrt(4*1 + 9*1) = sqrt(13)
                    Assert.Equal(MathF.Sqrt(13f), VectorOps.WeightedEuclideanDistance(a, b, w), 5);
                }

                [Fact]
                public void EmptyArrays_ReturnsZero()
                {
                    Assert.Equal(0f, VectorOps.WeightedEuclideanDistance(
                        ReadOnlySpan<float>.Empty, ReadOnlySpan<float>.Empty, ReadOnlySpan<float>.Empty), 5);
                }
            }
    assertions:
      - type: "output_contains"
        value: "Vector"
      - type: "exit_success"
    rubric:
      - "Identifies the scalar 3-array fused loop as a SIMD vectorization candidate (Category A — multi-input fused computation)"
      - "Introduces cross-platform Vector128/Vector256 SIMD intrinsics to process all three arrays in a single vectorized pass"
      - "Preserves the existing public API signature (WeightedEuclideanDistance with ReadOnlySpan<float> parameters)"
      - "Handles tail elements correctly (array lengths not divisible by vector width)"
      - "Preserves scalar fallback path for short inputs or non-accelerated hardware"
      - "Existing unit tests still pass after the optimization"
    timeout: 180

  - name: "Optimize quantized dequantization"
    prompt: "This .NET 8 project has a method that converts quantized byte values to float arrays using a scale factor and zero point. It's used in an ML inference pipeline to dequantize model weights and activations. The arrays are typically 1024-4096 elements and the method is called thousands of times per inference batch. It's currently a bottleneck. Please optimize Dequantize for maximum throughput. Keep the same public API and make sure all existing tests still pass."
    setup:
      files:
        - path: "Dequantize/Dequantize.csproj"
          content: |
            <Project Sdk="Microsoft.NET.Sdk">
              <PropertyGroup>
                <TargetFramework>net8.0</TargetFramework>
                <Nullable>enable</Nullable>
                <ImplicitUsings>enable</ImplicitUsings>
              </PropertyGroup>
            </Project>
        - path: "Dequantize/QuantOps.cs"
          content: |
            namespace Dequantize;

            public static class QuantOps
            {
                /// <summary>
                /// Dequantizes byte values to float using: output[i] = (quantized[i] - zeroPoint) * scale
                /// </summary>
                public static void Dequantize(ReadOnlySpan<byte> quantized, Span<float> output, float scale, byte zeroPoint)
                {
                    if (quantized.Length != output.Length)
                        throw new ArgumentException("Input and output must have the same length.");

                    for (int i = 0; i < quantized.Length; i++)
                    {
                        output[i] = (quantized[i] - zeroPoint) * scale;
                    }
                }
            }
        - path: "Dequantize.Tests/Dequantize.Tests.csproj"
          content: |
            <Project Sdk="Microsoft.NET.Sdk">
              <PropertyGroup>
                <TargetFramework>net8.0</TargetFramework>
                <Nullable>enable</Nullable>
                <ImplicitUsings>enable</ImplicitUsings>
                <IsPackable>false</IsPackable>
                <IsTestProject>true</IsTestProject>
              </PropertyGroup>
              <ItemGroup>
                <PackageReference Include="Microsoft.NET.Test.Sdk" Version="17.8.0" />
                <PackageReference Include="xunit" Version="2.9.0" />
                <PackageReference Include="xunit.runner.visualstudio" Version="2.8.2" />
              </ItemGroup>
              <ItemGroup>
                <ProjectReference Include="..\Dequantize\Dequantize.csproj" />
              </ItemGroup>
            </Project>
        - path: "Dequantize.Tests/QuantOpsTests.cs"
          content: |
            using Dequantize;

            namespace Dequantize.Tests;

            public class QuantOpsTests
            {
                [Fact]
                public void BasicDequantize()
                {
                    byte[] input = { 100, 128, 200 };
                    float[] output = new float[3];
                    QuantOps.Dequantize(input, output, 0.1f, 128);
                    Assert.Equal(-2.8f, output[0], 4);
                    Assert.Equal(0f, output[1], 4);
                    Assert.Equal(7.2f, output[2], 4);
                }

                [Fact]
                public void ZeroPointAtZero()
                {
                    byte[] input = { 0, 1, 255 };
                    float[] output = new float[3];
                    QuantOps.Dequantize(input, output, 0.5f, 0);
                    Assert.Equal(0f, output[0], 5);
                    Assert.Equal(0.5f, output[1], 5);
                    Assert.Equal(127.5f, output[2], 5);
                }

                [Fact]
                public void DifferentLengths_Throws()
                {
                    Assert.Throws<ArgumentException>(() =>
                        QuantOps.Dequantize(new byte[] { 1, 2 }, new float[3], 1f, 0));
                }

                [Fact]
                public void EmptyInput_NoOp()
                {
                    QuantOps.Dequantize(ReadOnlySpan<byte>.Empty, Span<float>.Empty, 1f, 0);
                }

                [Fact]
                public void LargeBuffer()
                {
                    var rng = new Random(42);
                    var input = new byte[2048];
                    rng.NextBytes(input);
                    var output = new float[2048];
                    byte zp = 128;
                    float scale = 0.05f;

                    QuantOps.Dequantize(input, output, scale, zp);

                    for (int i = 0; i < input.Length; i++)
                    {
                        float expected = (input[i] - zp) * scale;
                        Assert.Equal(expected, output[i], 4);
                    }
                }

                [Fact]
                public void ShortInput_BelowVectorWidth()
                {
                    byte[] input = { 130, 126 };
                    float[] output = new float[2];
                    QuantOps.Dequantize(input, output, 1f, 128);
                    Assert.Equal(2f, output[0], 5);
                    Assert.Equal(-2f, output[1], 5);
                }

                [Fact]
                public void AllSameValue()
                {
                    byte[] input = { 128, 128, 128, 128 };
                    float[] output = new float[4];
                    QuantOps.Dequantize(input, output, 0.1f, 128);
                    Assert.All(output, v => Assert.Equal(0f, v, 5));
                }
            }
    assertions:
      - type: "output_contains"
        value: "Vector"
      - type: "exit_success"
    rubric:
      - "Identifies the scalar byte-to-float conversion loop as a SIMD vectorization candidate (Category B — cross-type conversion)"
      - "Introduces cross-platform Vector128/Vector256 SIMD intrinsics with byte-to-float widening and type conversion"
      - "Preserves the existing public API signature (Dequantize with ReadOnlySpan<byte>, Span<float> parameters)"
      - "Handles tail elements correctly (array lengths not divisible by vector width)"
      - "Preserves scalar fallback path for short inputs or non-accelerated hardware"
      - "Existing unit tests still pass after the optimization"
    timeout: 180

  - name: "No optimization opportunity â€” string processing service"
    prompt: "This .NET 8 project has a text processing service that deduplicates and sorts a list of tags. It's used at API request time to normalize user-provided tag lists. The tag lists are typically 5-20 items. Please review the code and optimize it for performance with SIMD if possible. All existing tests must continue to pass."
    setup:
      files:
        - path: "TagService/TagService.csproj"
          content: |
            <Project Sdk="Microsoft.NET.Sdk">
              <PropertyGroup>
                <TargetFramework>net8.0</TargetFramework>
                <Nullable>enable</Nullable>
                <ImplicitUsings>enable</ImplicitUsings>
              </PropertyGroup>
            </Project>
        - path: "TagService/TagNormalizer.cs"
          content: |
            namespace TagService;

            public static class TagNormalizer
            {
                /// <summary>
                /// Normalizes a list of tags by trimming whitespace, converting to lowercase,
                /// removing duplicates, and sorting alphabetically.
                /// </summary>
                public static List<string> NormalizeTags(IEnumerable<string> tags)
                {
                    var seen = new HashSet<string>(StringComparer.OrdinalIgnoreCase);
                    var result = new List<string>();

                    foreach (var tag in tags)
                    {
                        var trimmed = tag.Trim();
                        if (trimmed.Length == 0)
                            continue;

                        var lower = trimmed.ToLowerInvariant();
                        if (seen.Add(lower))
                        {
                            result.Add(lower);
                        }
                    }

                    result.Sort(StringComparer.Ordinal);
                    return result;
                }
            }
        - path: "TagService.Tests/TagService.Tests.csproj"
          content: |
            <Project Sdk="Microsoft.NET.Sdk">
              <PropertyGroup>
                <TargetFramework>net8.0</TargetFramework>
                <Nullable>enable</Nullable>
                <ImplicitUsings>enable</ImplicitUsings>
                <IsPackable>false</IsPackable>
                <IsTestProject>true</IsTestProject>
              </PropertyGroup>
              <ItemGroup>
                <PackageReference Include="Microsoft.NET.Test.Sdk" Version="17.8.0" />
                <PackageReference Include="xunit" Version="2.9.0" />
                <PackageReference Include="xunit.runner.visualstudio" Version="2.8.2" />
              </ItemGroup>
              <ItemGroup>
                <ProjectReference Include="..\TagService\TagService.csproj" />
              </ItemGroup>
            </Project>
        - path: "TagService.Tests/TagNormalizerTests.cs"
          content: |
            using TagService;

            namespace TagService.Tests;

            public class TagNormalizerTests
            {
                [Fact]
                public void EmptyInput_ReturnsEmpty()
                {
                    var result = TagNormalizer.NormalizeTags(Array.Empty<string>());
                    Assert.Empty(result);
                }

                [Fact]
                public void RemovesDuplicates_CaseInsensitive()
                {
                    var result = TagNormalizer.NormalizeTags(new[] { "CSharp", "csharp", "CSHARP" });
                    Assert.Single(result);
                    Assert.Equal("csharp", result[0]);
                }

                [Fact]
                public void TrimsWhitespace()
                {
                    var result = TagNormalizer.NormalizeTags(new[] { "  dotnet  ", " azure " });
                    Assert.Equal(new[] { "azure", "dotnet" }, result);
                }

                [Fact]
                public void SkipsEmptyAndWhitespace()
                {
                    var result = TagNormalizer.NormalizeTags(new[] { "", "  ", "valid" });
                    Assert.Single(result);
                    Assert.Equal("valid", result[0]);
                }

                [Fact]
                public void SortsAlphabetically()
                {
                    var result = TagNormalizer.NormalizeTags(new[] { "zebra", "apple", "mango" });
                    Assert.Equal(new[] { "apple", "mango", "zebra" }, result);
                }

                [Fact]
                public void CombinedBehavior()
                {
                    var result = TagNormalizer.NormalizeTags(new[] { " B ", "a", "b", "", "C" });
                    Assert.Equal(new[] { "a", "b", "c" }, result);
                }
            }
    assertions:
      - type: "exit_success"
    rubric:
      - "Correctly identifies that this code has no meaningful SIMD vector math optimization opportunity"
      - "Explains why SIMD is not applicable (string processing, small collections of 5-20 items, no floating-point array math, HashSet/sort overhead dominates)"
      - "Does not introduce unnecessary SIMD code or Vector256/Vector128 intrinsics that add complexity without benefit"
      - "Does not generate greenfield SIMD implementations where no scalar vector math candidate exists"
      - "Existing tests still pass â€” code is not broken by unnecessary changes"
    timeout: 180

