scenarios:
  - name: "Add chat to ASP.NET Core API"
    prompt: "Add an LLM-powered chat endpoint to this .NET 10 web API using OpenAI. The endpoint should accept a user message and return the AI response."
    setup:
      files:
        - path: "ChatApi/ChatApi.csproj"
          content: |
            <Project Sdk="Microsoft.NET.Sdk.Web">
              <PropertyGroup>
                <TargetFramework>net10.0</TargetFramework>
                <Nullable>enable</Nullable>
                <ImplicitUsings>enable</ImplicitUsings>
              </PropertyGroup>
            </Project>
        - path: "ChatApi/Program.cs"
          content: |
            var builder = WebApplication.CreateBuilder(args);
            var app = builder.Build();
            app.Run();
    assertions:
      - type: "output_contains"
        value: "Microsoft.Extensions.AI"
      - type: "output_contains"
        value: "IChatClient"
      - type: "exit_success"
    rubric:
      - "Uses Microsoft.Extensions.AI as the abstraction layer"
      - "Registers IChatClient in DI using AddChatClient pattern"
      - "Does not hardcode API keys — uses configuration or environment variables"
      - "Creates a proper API endpoint that accepts user input"
    timeout: 360

  - name: "Add middleware pipeline"
    prompt: "My .NET 10 app already uses IChatClient from Microsoft.Extensions.AI with OpenAI. Add caching and OpenTelemetry tracing to the chat client pipeline."
    setup:
      files:
        - path: "MyApp/MyApp.csproj"
          content: |
            <Project Sdk="Microsoft.NET.Sdk.Web">
              <PropertyGroup>
                <TargetFramework>net10.0</TargetFramework>
              </PropertyGroup>
              <ItemGroup>
                <PackageReference Include="Microsoft.Extensions.AI" Version="9.3.0" />
                <PackageReference Include="OpenAI" Version="2.2.0" />
              </ItemGroup>
            </Project>
        - path: "MyApp/Program.cs"
          content: |
            using Microsoft.Extensions.AI;
            var builder = WebApplication.CreateBuilder(args);
            builder.Services.AddChatClient(new OpenAI.OpenAIClient(builder.Configuration["OpenAI:Key"]).GetChatClient("gpt-4o").AsIChatClient());
            var app = builder.Build();
            app.Run();
    assertions:
      - type: "output_contains"
        value: "Cache"
      - type: "output_contains"
        value: "Telemetry"
      - type: "exit_success"
    rubric:
      - "Adds UseDistributedCache or similar caching middleware to the ChatClientBuilder pipeline"
      - "Adds UseOpenTelemetry to the pipeline"
      - "Configures the middleware in the correct order in AddChatClient"
    timeout: 360
